name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: src/backend

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: src/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: poms
          POSTGRES_PASSWORD: poms_dev_password
          POSTGRES_DB: poms
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U poms -d poms"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql+asyncpg://poms:poms_dev_password@localhost:5432/poms
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: src/backend/uv.lock

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --frozen

      - name: Create test database
        env:
          PGPASSWORD: poms_dev_password
        run: |
          until pg_isready -h localhost -U poms -d poms; do sleep 1; done
          psql -h localhost -U poms -d poms -c "CREATE DATABASE poms_test;"

      - name: Run pytest
        run: uv run pytest --cov=. --cov-report=term-missing
