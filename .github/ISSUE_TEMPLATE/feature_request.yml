name: Feature Request
description: Propose a new capability or enhancement to POMS
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What user or operational problem are we trying to solve? Who is affected?
      placeholder: Reviewers spend too much time re-checking vendors that are almost-matches...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior. UI sketches, API shapes, or pipeline changes welcome.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Backend — API / routes
        - Backend — Agent pipeline
        - Backend — Services
        - Backend — Database / migrations
        - Frontend — Dashboard / orders
        - Frontend — Reviews
        - Frontend — Analytics
        - Knowledge base / RAG
        - Infrastructure / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you did not pick them.

  - type: textarea
    id: impact
    attributes:
      label: Impact on existing behavior
      description: Does this change routing rules, issue tags, the DB schema, or public API contracts?

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues and this is not a duplicate
          required: true
        - label: This aligns with the routing principle — auto-approve but never auto-reject
          required: false
