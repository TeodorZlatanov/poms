services:
  postgres:
    image: postgres:18.3
    container_name: poms-postgres
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-poms}
      POSTGRES_USER: ${POSTGRES_USER:-poms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-poms_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - poms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-poms} -d ${POSTGRES_DB:-poms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:

networks:
  poms-network:
    driver: bridge
